name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure npm registry
        run: |
          echo "@electricelephants:registry=https://git.on.seo/api/v4/projects/2195/packages/npm/" > .npmrc
          echo "//git.on.seo/api/v4/projects/2195/packages/npm/:_authToken=${{ secrets.GITLAB_NPM_TOKEN }}" >> .npmrc
          echo "strict-ssl=false" >> .npmrc

      - run: npm ci
      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
